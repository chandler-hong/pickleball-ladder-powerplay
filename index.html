<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PowerPlay Pickleball Ladder Round Robin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #080c14; color: #c8d6e5; min-height: 100vh;
    padding: 3rem 1.5rem;
    -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1000px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 2.5rem; }
  .header h1 {
    font-size: 2.25rem; font-weight: 700; letter-spacing: -0.03em;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 0.35rem;
  }
  .header p { color: #4b5c72; font-size: 0.9rem; font-weight: 400; }

  /* Cards */
  .card {
    background: #111827; border-radius: 16px; padding: 1.75rem;
    margin-bottom: 1.5rem;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25), 0 1px 3px rgba(0,0,0,0.15);
  }
  .card-title {
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: #4b5c72; margin-bottom: 1.25rem;
  }

  /* Player Grid */
  .player-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 0.6rem;
  }
  .player-input { display: flex; align-items: center; gap: 0.5rem; }
  .player-num {
    font-size: 0.7rem; font-weight: 600; color: #374357;
    min-width: 1.5rem; text-align: right; font-variant-numeric: tabular-nums;
  }
  .player-input input[type="text"] {
    flex: 1; padding: 0.55rem 0.85rem; border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: #e2e8f0;
    font-family: inherit; font-size: 0.85rem; outline: none;
    transition: all 0.2s ease;
  }
  .player-input input[type="text"]:hover { border-color: rgba(255,255,255,0.12); }
  .player-input input[type="text"]:focus {
    border-color: #60a5fa; background: rgba(96,165,250,0.06);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.1);
  }
  .player-input input[type="text"]::placeholder { color: #2d3a4d; }

  /* Gender Toggle */
  .gender-toggle {
    display: flex; border-radius: 8px; overflow: hidden; flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03);
  }
  .gender-toggle input { display: none; }
  .gender-toggle label {
    padding: 0.35rem 0.6rem; font-size: 0.7rem; font-weight: 600;
    cursor: pointer; color: #374357; min-width: unset; text-align: center;
    transition: all 0.2s ease; letter-spacing: 0.02em;
  }
  .gender-toggle label:hover { color: #5a6b80; }
  .gender-toggle input:checked + label.g-m {
    background: rgba(96,165,250,0.15); color: #60a5fa;
  }
  .gender-toggle input:checked + label.g-f {
    background: rgba(244,114,182,0.15); color: #f472b6;
  }

  /* Court Number Inputs */
  .court-inputs { display: flex; gap: 0.75rem; flex-wrap: wrap; }
  .court-num-group {
    display: flex; align-items: center; gap: 0.5rem;
  }
  .court-num-group span {
    font-size: 0.7rem; font-weight: 600; color: #374357;
  }
  .court-num-input {
    width: 56px; padding: 0.5rem; border-radius: 10px; text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: #e2e8f0;
    font-family: inherit; font-size: 0.9rem; font-weight: 600; outline: none;
    transition: all 0.2s ease;
    -moz-appearance: textfield;
  }
  .court-num-input::-webkit-outer-spin-button,
  .court-num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .court-num-input:hover { border-color: rgba(255,255,255,0.12); }
  .court-num-input:focus {
    border-color: #60a5fa; background: rgba(96,165,250,0.06);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.1);
  }

  /* Options Row */
  .option-row {
    display: flex; align-items: center; gap: 0.6rem; margin-top: 1rem;
  }
  .toggle-switch {
    position: relative; width: 36px; height: 20px; flex-shrink: 0;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 10px; cursor: pointer;
    background: #1f2937; border: 1px solid rgba(255,255,255,0.08);
    transition: all 0.25s ease;
  }
  .toggle-track::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; border-radius: 50%;
    background: #4b5c72; transition: all 0.25s ease;
  }
  .toggle-switch input:checked + .toggle-track {
    background: rgba(96,165,250,0.2); border-color: rgba(96,165,250,0.3);
  }
  .toggle-switch input:checked + .toggle-track::after {
    transform: translateX(16px); background: #60a5fa;
  }
  .option-label {
    font-size: 0.82rem; color: #5a6b80; cursor: pointer;
    user-select: none; transition: color 0.2s;
  }
  .option-label:hover { color: #8899aa; }

  /* Controls Row */
  .controls {
    display: flex; align-items: center; gap: 1rem; margin-top: 1.25rem;
    flex-wrap: wrap;
  }
  .controls label {
    font-size: 0.82rem; color: #5a6b80; font-weight: 500;
  }
  .rounds-input {
    width: 64px; padding: 0.55rem 0.5rem; border-radius: 10px; text-align: center;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04); color: #e2e8f0;
    font-family: inherit; font-size: 0.9rem; font-weight: 600; outline: none;
    transition: all 0.2s ease;
    -moz-appearance: textfield;
  }
  .rounds-input::-webkit-outer-spin-button,
  .rounds-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .rounds-input:hover { border-color: rgba(255,255,255,0.12); }
  .rounds-input:focus {
    border-color: #60a5fa; background: rgba(96,165,250,0.06);
    box-shadow: 0 0 0 3px rgba(96,165,250,0.1);
  }
  .spacer { flex: 1; }

  /* Buttons */
  .btn {
    padding: 0.6rem 1.25rem; border-radius: 10px; border: none;
    font-family: inherit; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s ease;
  }
  .btn-secondary {
    background: rgba(255,255,255,0.06); color: #5a6b80;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #8899aa; }
  .btn-primary {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: #fff; box-shadow: 0 2px 12px rgba(59,130,246,0.3);
  }
  .btn-primary:hover {
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); }

  /* Schedule Section */
  .schedule-header {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem;
  }
  .schedule-header h2 { margin-bottom: 0; }
  .btn-export {
    font-family: inherit; font-size: 0.75rem; font-weight: 600;
    padding: 0.4rem 0.9rem; border-radius: 8px; cursor: pointer;
    border: 1px solid rgba(251,146,60,0.3); background: rgba(251,146,60,0.12);
    color: #fb923c; transition: all 0.2s ease; margin-left: auto;
  }
  .btn-export:hover { background: rgba(251,146,60,0.22); color: #fdba74; }
  .schedule h2, .stats h2 {
    font-size: 1.25rem; font-weight: 700; margin-bottom: 1.25rem;
    color: #e2e8f0; letter-spacing: -0.02em;
  }
  .current-round-banner {
    background: linear-gradient(135deg, rgba(34,197,94,0.12), rgba(110,231,183,0.12));
    border: 1px solid rgba(110,231,183,0.2); border-radius: 12px;
    padding: 0.85rem 1.25rem; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: 0.75rem;
  }
  .current-round-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #6ee7b7;
    box-shadow: 0 0 8px rgba(110,231,183,0.5);
    animation: pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .current-round-text {
    font-size: 0.9rem; font-weight: 600; color: #6ee7b7;
  }
  .current-round-text span { color: #e2e8f0; }
  .all-done-text { font-size: 0.9rem; font-weight: 600; color: #6ee7b7; }

  .round {
    background: #111827; border-radius: 14px; padding: 1.25rem;
    margin-bottom: 0.75rem;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    transition: all 0.3s ease;
  }
  .round.current-round {
    border-color: rgba(110,231,183,0.25);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15), 0 0 0 1px rgba(110,231,183,0.1);
  }
  .round.round-completed {
    opacity: 0.35;
  }
  .round.round-completed .round-title,
  .round.round-completed .court-label,
  .round.round-completed .sit-out {
    text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.2);
  }
  .round.round-future {
    opacity: 0.4; pointer-events: none;
  }
  .round-header {
    display: flex; align-items: center; gap: 0.75rem;
    margin-bottom: 0.85rem;
  }
  .round-title { font-weight: 700; font-size: 0.95rem; color: #e2e8f0; }
  .round-header-right {
    margin-left: auto; display: flex; align-items: center; gap: 0.6rem;
  }

  /* Clickable teams */
  .team { cursor: pointer; transition: all 0.2s ease; }
  .team:hover { filter: brightness(1.2); }
  .team.winner {
    background: rgba(110,231,183,0.18); color: #a7f3d0;
    box-shadow: 0 0 0 1.5px rgba(110,231,183,0.35);
  }
  .team.loser {
    opacity: 0.35; text-decoration: line-through;
    text-decoration-color: rgba(255,255,255,0.15);
  }
  .sit-out {
    font-size: 0.78rem; color: #fca5a5;
    background: rgba(239,68,68,0.1); padding: 0.25rem 0.75rem;
    border-radius: 20px; border: 1px solid rgba(239,68,68,0.15);
  }
  .courts {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 0.6rem;
  }
  .court {
    background: rgba(255,255,255,0.03); border-radius: 10px; padding: 0.85rem;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .court-label {
    font-size: 0.85rem; font-weight: 800; color: #e2e8f0;
    letter-spacing: 0.02em; margin-bottom: 0.6rem;
    background: rgba(255,255,255,0.06); display: inline-block;
    padding: 0.2rem 0.6rem; border-radius: 6px;
  }
  .matchup {
    display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem;
  }
  .team {
    flex: 1; padding: 0.4rem 0.6rem; border-radius: 8px; text-align: center;
    font-weight: 500;
  }
  .team-a { background: rgba(96,165,250,0.12); color: #93c5fd; }
  .team-b { background: rgba(244,114,182,0.12); color: #f9a8d4; }
  .serve-badge {
    display: inline-block; font-size: 0.5rem; font-weight: 700;
    letter-spacing: 0.06em; background: rgba(96,165,250,0.25);
    color: #60a5fa; padding: 0.1rem 0.35rem; border-radius: 4px;
    margin-right: 0.4rem; vertical-align: middle; line-height: 1.4;
  }
  .vs {
    font-weight: 700; color: #2d3a4d; font-size: 0.7rem; flex-shrink: 0;
    letter-spacing: 0.05em;
  }

  /* Stats */
  .stats { margin-bottom: 2rem; }
  .stats-toggle {
    display: flex; align-items: center; gap: 0.6rem; cursor: pointer;
    user-select: none; margin-bottom: 1.25rem;
  }
  .stats-toggle h2 { margin-bottom: 0; }
  .stats-chevron {
    display: inline-block; width: 20px; height: 20px; border-radius: 6px;
    background: rgba(255,255,255,0.06); color: #4b5c72;
    font-size: 0.7rem; line-height: 20px; text-align: center;
    transition: all 0.25s ease; flex-shrink: 0;
  }
  .stats-toggle:hover .stats-chevron { background: rgba(255,255,255,0.1); color: #8899aa; }
  .stats-toggle.collapsed .stats-chevron { transform: rotate(-90deg); }
  .stats-body { transition: all 0.3s ease; overflow: hidden; }
  .stats-body.collapsed { display: none; }
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1rem; margin-bottom: 1.25rem;
  }
  .stat-card {
    background: #111827; border-radius: 14px; padding: 1.5rem;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .stat-card h3 {
    font-size: 0.7rem; font-weight: 600; color: #4b5c72;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem;
  }
  .stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.4rem 0; font-size: 0.82rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-name { color: #8899aa; }
  .stat-value { color: #e2e8f0; font-weight: 600; font-variant-numeric: tabular-nums; }

  .diversity-bar {
    height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06);
    overflow: hidden; margin-top: 0.4rem;
  }
  .diversity-fill {
    height: 100%; border-radius: 3px; transition: width 0.4s ease;
  }

  /* Matrix */
  .matrix-container {
    background: #111827; border-radius: 14px; padding: 1.5rem;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    overflow-x: auto; margin-bottom: 1rem;
  }
  .matrix-container h3 {
    font-size: 0.7rem; font-weight: 600; color: #4b5c72;
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem;
  }
  table.matrix { border-collapse: separate; border-spacing: 2px; font-size: 0.72rem; }
  table.matrix th, table.matrix td {
    padding: 0.3rem 0.5rem; text-align: center; min-width: 2.1rem;
  }
  table.matrix th {
    color: #4b5c72; font-weight: 600; background: transparent;
  }
  table.matrix td {
    color: #c8d6e5; border-radius: 4px; font-variant-numeric: tabular-nums;
  }
  table.matrix td.diag { background: rgba(255,255,255,0.03); color: #2d3a4d; }
  .heat-0 { background: rgba(255,255,255,0.03); }
  .heat-1 { background: rgba(96,165,250,0.1); }
  .heat-2 { background: rgba(96,165,250,0.18); }
  .heat-3 { background: rgba(96,165,250,0.28); color: #e2e8f0; }
  .heat-4 { background: rgba(96,165,250,0.4); color: #fff; }
  .heat-5 { background: rgba(96,165,250,0.55); color: #fff; font-weight: 600; }

  /* Validation */
  .input-error {
    border-color: #ef4444 !important;
    background: rgba(239,68,68,0.06) !important;
    box-shadow: 0 0 0 3px rgba(239,68,68,0.1) !important;
  }
  .error-banner {
    background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
    border-radius: 10px; padding: 0.75rem 1rem; margin-bottom: 1.5rem;
    font-size: 0.82rem; color: #fca5a5; display: none;
  }
  .error-banner ul { margin: 0.35rem 0 0 1.25rem; }
  .error-banner li { margin-bottom: 0.15rem; }

  /* Leaderboard */
  .leaderboard { margin-bottom: 2rem; }
  .leaderboard h2 {
    font-size: 1.25rem; font-weight: 700; margin-bottom: 1.25rem;
    color: #e2e8f0; letter-spacing: -0.02em;
  }
  .leaderboard-table {
    width: 100%; border-collapse: separate; border-spacing: 0;
    background: #111827; border-radius: 14px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .leaderboard-table th {
    font-size: 0.7rem; font-weight: 600; color: #4b5c72;
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.85rem 1rem; text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .leaderboard-table th:not(:first-child) { text-align: center; }
  .leaderboard-table td {
    padding: 0.6rem 1rem; font-size: 0.85rem;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .leaderboard-table td:not(:first-child) {
    text-align: center; font-variant-numeric: tabular-nums; font-weight: 600;
  }
  .leaderboard-table tr:last-child td { border-bottom: none; }
  .leaderboard-table tbody tr { transition: background 0.15s; }
  .leaderboard-table tbody tr:hover { background: rgba(255,255,255,0.03); }
  .lb-rank {
    font-weight: 700; color: #4b5c72; min-width: 1.5rem;
    display: inline-block;
  }
  .lb-name { color: #e2e8f0; margin-left: 0.5rem; }
  .lb-wins { color: #6ee7b7; }
  .lb-losses { color: #fca5a5; }
  .lb-pct { color: #93c5fd; }
  .lb-bar-cell { width: 30%; }
  .lb-bar {
    display: flex; height: 6px; border-radius: 3px; overflow: hidden;
    background: rgba(255,255,255,0.04);
  }
  .lb-bar-w { background: #6ee7b7; transition: width 0.3s; }
  .lb-bar-l { background: #ef4444; transition: width 0.3s; }
  .lb-empty { color: #2d3a4d; font-weight: 400; }
  .lb-medal { margin-right: 0.15rem; }

  #output { display: none; }

  @media (max-width: 640px) {
    body { padding: 1.5rem 0.75rem; }
    .player-grid { grid-template-columns: 1fr; }
    .courts { grid-template-columns: 1fr; }
    .card { padding: 1.25rem; }
  }

  /* Print styles */
  .print-title { display: none; }

  @media print {
    body {
      background: #fff !important; color: #111 !important;
      padding: 0.3cm !important; font-size: 9pt;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .container { max-width: 100%; }

    /* Hide input UI */
    .header, .card, #errorBanner, .stats, .current-round-banner,
    .btn-export, .schedule-header .btn-export { display: none !important; }

    /* Show print title */
    .print-title {
      display: block !important; text-align: center; margin-bottom: 0.3cm;
      padding-bottom: 0.2cm; border-bottom: 2px solid #222;
    }
    .print-title h1 { font-size: 16pt; color: #111; margin-bottom: 2pt; }
    .print-title p { font-size: 8pt; color: #666; }

    #output { display: flex !important; flex-direction: column; }

    /* Leaderboard first, schedule second */
    #leaderboardSection { order: -1; }
    #scheduleSection { order: 1; }

    /* Leaderboard */
    .leaderboard { margin-bottom: 0.3cm; }
    .leaderboard h2 { font-size: 11pt; color: #111; margin-bottom: 0.15cm; }
    .leaderboard-table {
      background: #fff !important; border: 1px solid #ccc !important;
      box-shadow: none !important; font-size: 8pt;
    }
    .leaderboard-table th {
      color: #374151 !important; border-bottom: 2px solid #d1d5db !important;
      font-size: 7pt; padding: 0.1cm 0.2cm;
    }
    .leaderboard-table td {
      border-bottom: 1px solid #e5e7eb !important;
      font-size: 8pt; padding: 0.07cm 0.2cm;
    }
    .lb-rank { color: #374151 !important; }
    .lb-name { color: #111 !important; }
    .lb-wins { color: #065f46 !important; }
    .lb-losses { color: #991b1b !important; }
    .lb-pct { color: #1e40af !important; }
    .lb-bar { height: 4pt; }
    .lb-bar-w { background: #34d399 !important; }
    .lb-bar-l { background: #f87171 !important; }

    /* Schedule — condensed */
    .schedule-header { margin-bottom: 0.15cm; }
    .schedule-header h2 { font-size: 11pt; color: #111; margin-bottom: 0; }
    .round {
      background: #fff !important; border: 1px solid #ddd !important;
      box-shadow: none !important; padding: 0.15cm 0.2cm;
      margin-bottom: 0.1cm; border-radius: 4px !important;
      break-inside: avoid; opacity: 1 !important; pointer-events: auto !important;
    }
    .round.round-future { opacity: 1 !important; }
    .round.round-completed { opacity: 0.5 !important; }
    .round-header { margin-bottom: 0.1cm; gap: 0.3rem; }
    .round-title { color: #111 !important; font-size: 8pt; font-weight: 800; }
    .sit-out {
      background: #fee2e2 !important; color: #991b1b !important;
      border-color: #fca5a5 !important; font-size: 6.5pt;
      padding: 0.05cm 0.15cm !important;
    }
    .courts { gap: 0.15cm; }
    .court {
      background: #f9fafb !important; border: 1px solid #e5e7eb !important;
      padding: 0.1cm 0.15cm; border-radius: 3px !important;
    }
    .court-label {
      color: #111 !important; background: #e5e7eb !important;
      font-size: 7pt; padding: 0.05cm 0.2cm !important;

function guessGender(name) {
  const key = name.trim().split(/\s+/)[0].toLowerCase();
  if (!key) return null;
  if (FEMALE_NAMES.has(key)) return 'F';
  if (MALE_NAMES.has(key)) return 'M';
  return null;
}

// --- State variables (declared early for restore) ---
let totalRounds = 0;
let numCourtsInSchedule = 0;
let roundWinners = {};
let scheduleData = null;
let scheduleNames = null;
let scheduleCourtNames = [];
let lastFullResult = null;

// --- LocalStorage persistence ---
const STORAGE_KEY = 'powerplay_pickleball_state';

function saveState() {
  savePlayerData();
  saveCourtData();
  const state = {
    numPlayers: currentPlayerCount,
    numCourts: currentCourtCount,
    numRounds: document.getElementById('numRounds').value,
    preferMixed: document.getElementById('preferMixed').checked,
    playerData,
    courtData,
    // Schedule state (if generated)
    hasSchedule: !!scheduleData,
    scheduleResult: scheduleData ? { schedule: scheduleData } : null,
    scheduleNames,
    scheduleCourtNames: scheduleCourtNames,
    roundWinners,
    // Also save the full generateSchedule result for stats
    fullResult: lastFullResult || null,
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function restoreState() {
  let state;
  try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) {}
  if (!state) return false;

  // Restore setup values
  document.getElementById('numPlayers').value = state.numPlayers || 15;
  document.getElementById('numCourts').value = state.numCourts || 3;
  document.getElementById('numRounds').value = state.numRounds || 15;
  document.getElementById('preferMixed').checked = state.preferMixed !== false;

  // Restore grids (skipSave=true to avoid overwriting restored data)
  playerData = state.playerData || [];
  courtData = state.courtData || [];
  buildPlayerGrid(state.numPlayers || 15, true);
  buildCourtInputs(state.numCourts || 3, true);

  // Restore schedule if it was generated
  if (state.hasSchedule && state.scheduleResult && state.scheduleNames) {
    scheduleCourtNames = state.scheduleCourtNames || [];
    lastFullResult = state.fullResult || null;
    renderSchedule(state.scheduleResult, state.scheduleNames, scheduleCourtNames);
    if (lastFullResult) renderStats(lastFullResult, state.scheduleNames);
    roundWinners = state.roundWinners || {};
    updateRoundStates();
    document.getElementById('output').style.display = 'block';
  }

  return true;
}

function clearSavedState() {
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
}

// --- Dynamic grid builders ---
let currentPlayerCount = 15;
let currentCourtCount = 3;

// Stores current values so they survive rebuilds
let playerData = []; // [{name, gender}]
let courtData = [];  // [number]

function buildPlayerGrid(count, skipSave) {
  const grid = document.getElementById('playerGrid');
  if (!skipSave) savePlayerData();
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const div = document.createElement('div');
    div.className = 'player-input';
    div.innerHTML = `<span class="player-num">${i + 1}.</span><input type="text" id="p${i}" placeholder="Player ${i + 1}">` +
      `<div class="gender-toggle">` +
      `<input type="radio" name="g${i}" id="g${i}m" value="M" checked>` +
      `<label for="g${i}m" class="g-m">M</label>` +
      `<input type="radio" name="g${i}" id="g${i}f" value="F">` +
      `<label for="g${i}f" class="g-f">F</label>` +
      `</div>`;
    grid.appendChild(div);
    // Restore saved data
    if (i < playerData.length) {
      document.getElementById(`p${i}`).value = playerData[i].name;
      if (playerData[i].gender === 'F') document.getElementById(`g${i}f`).checked = true;
    }
    document.getElementById(`p${i}`).addEventListener('input', function() {
      this.classList.remove('input-error');
      const g = guessGender(this.value);
      if (g) document.getElementById(`g${this.id.slice(1)}${g.toLowerCase()}`).checked = true;
      saveState();
    });
    // Save on gender toggle change
    document.getElementById(`g${i}m`).addEventListener('change', saveState);
    document.getElementById(`g${i}f`).addEventListener('change', saveState);
  }
  currentPlayerCount = count;
}

function buildCourtInputs(count, skipSave) {
  const container = document.getElementById('courtInputs');
  if (!skipSave) saveCourtData();
  container.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const input = document.createElement('input');
    input.type = 'number'; input.className = 'court-num-input';
    input.id = `court${i}`; input.min = 1; input.max = 99;
    input.value = i < courtData.length ? courtData[i] : (i + 1);
    input.addEventListener('input', function() { this.classList.remove('input-error'); saveState(); });
    container.appendChild(input);
  }
  currentCourtCount = count;
}

function savePlayerData() {
  playerData = [];
  for (let i = 0; i < currentPlayerCount; i++) {
    const el = document.getElementById(`p${i}`);
    const gf = document.getElementById(`g${i}f`);
    if (el) playerData.push({ name: el.value, gender: gf && gf.checked ? 'F' : 'M' });
  }
}

function saveCourtData() {
  courtData = [];
  for (let i = 0; i < currentCourtCount; i++) {
    const el = document.getElementById(`court${i}`);
    if (el) courtData.push(el.value);
  }
}

// Rebuild grids when counts change
document.getElementById('numPlayers').addEventListener('input', function() {
  this.classList.remove('input-error');
  const v = parseInt(this.value);
  if (v >= 4 && v <= 40) buildPlayerGrid(v);
  saveState();
});
document.getElementById('numCourts').addEventListener('input', function() {
  this.classList.remove('input-error');
  const v = parseInt(this.value);
  if (v >= 1 && v <= 10) buildCourtInputs(v);
  saveState();
});
document.getElementById('numRounds').addEventListener('input', function() {
  this.classList.remove('input-error');
  saveState();
});
document.getElementById('preferMixed').addEventListener('change', saveState);

// Initial build (default — may be overridden by restoreState at end of script)
buildPlayerGrid(15);
buildCourtInputs(3);

function pickRandomNames(count) {
  const fList = [...AMERICAN_FEMALE];
  const mList = [...AMERICAN_MALE];
  // Shuffle both lists
  for (let i = fList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fList[i], fList[j]] = [fList[j], fList[i]];
  }
  for (let i = mList.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [mList[i], mList[j]] = [mList[j], mList[i]];
  }
  // Alternate M/F, capitalize first letter
  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);
  const result = [];
  const usedNames = new Set();
  let fi = 0, mi = 0;
  for (let i = 0; i < count; i++) {
    let name, gender;
    if (i % 2 === 0) {
      while (fi < fList.length && usedNames.has(fList[fi])) fi++;
      name = fi < fList.length ? fList[fi++] : `Player ${i + 1}`;
      gender = 'F';
    } else {
      while (mi < mList.length && usedNames.has(mList[mi])) mi++;
      name = mi < mList.length ? mList[mi++] : `Player ${i + 1}`;
      gender = 'M';
    }
    usedNames.add(name);
    result.push({ name: cap(name), gender });
  }
  return result;
}

// --- Algorithm ---
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function generateSchedule(numPlayers, numCourts, numRounds, iterations, genders, preferMixed) {
  const n = numPlayers;
  const playersPerRound = numCourts * 4;
  const numSitOuts = n - playersPerRound;
  const sitOutCount = new Array(n).fill(0);
  const partnerCount = Array.from({length: n}, () => new Array(n).fill(0));
  const opponentCount = Array.from({length: n}, () => new Array(n).fill(0));
  const playCount = new Array(n).fill(0);
  const schedule = [];

  for (let r = 0; r < numRounds; r++) {
    // Select sit-outs: those who have sat out least (to balance)
    const indices = Array.from({length: n}, (_, i) => i);
    indices.sort((a, b) => {
      if (sitOutCount[a] !== sitOutCount[b]) return sitOutCount[a] - sitOutCount[b];
      return Math.random() - 0.5;
    });
    const sitOuts = numSitOuts > 0 ? new Set(indices.slice(0, numSitOuts)) : new Set();
    const playing = indices.filter(i => !sitOuts.has(i));

    sitOuts.forEach(i => sitOutCount[i]++);

    // Optimize court assignments via random sampling
    let bestScore = -Infinity;
    let bestPerm = null;

    for (let iter = 0; iter < iterations; iter++) {
      const perm = shuffle(playing);
      let score = 0;

      for (let c = 0; c < numCourts; c++) {
        const b = c * 4;
        const a1 = perm[b], a2 = perm[b + 1], b1 = perm[b + 2], b2 = perm[b + 3];

        score -= partnerCount[a1][a2] * 15;
        score -= partnerCount[b1][b2] * 15;

        score -= opponentCount[a1][b1] * 6;
        score -= opponentCount[a1][b2] * 6;
        score -= opponentCount[a2][b1] * 6;
        score -= opponentCount[a2][b2] * 6;

        const courtPlayers = [a1, a2, b1, b2];
        for (let x = 0; x < 4; x++) {
          for (let y = x + 1; y < 4; y++) {
            score -= (partnerCount[courtPlayers[x]][courtPlayers[y]] +
                      opponentCount[courtPlayers[x]][courtPlayers[y]]) * 2;
          }
        }

        if (preferMixed) {
          const teamAMixed = genders[a1] !== genders[a2];
          const teamBMixed = genders[b1] !== genders[b2];
          if (teamAMixed) score += 20;
          if (teamBMixed) score += 20;
        }
      }

      if (score > bestScore) {
        bestScore = score;
        bestPerm = perm;
      }
    }

    // Record round
    const courts = [];
    for (let c = 0; c < numCourts; c++) {
      const b = c * 4;
      const a1 = bestPerm[b], a2 = bestPerm[b + 1];
      const b1 = bestPerm[b + 2], b2 = bestPerm[b + 3];

      partnerCount[a1][a2]++; partnerCount[a2][a1]++;
      partnerCount[b1][b2]++; partnerCount[b2][b1]++;

      opponentCount[a1][b1]++; opponentCount[b1][a1]++;
      opponentCount[a1][b2]++; opponentCount[b2][a1]++;
      opponentCount[a2][b1]++; opponentCount[b1][a2]++;
      opponentCount[a2][b2]++; opponentCount[b2][a2]++;

      [a1, a2, b1, b2].forEach(i => playCount[i]++);

      courts.push({ teamA: [a1, a2], teamB: [b1, b2] });
    }

    schedule.push({
      round: r + 1,
      courts,
      sitOuts: [...sitOuts]
    });
  }

  return { schedule, partnerCount, opponentCount, sitOutCount, playCount };
}

// --- Validation & Rendering ---
function clearValidation() {
  document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
  const banner = document.getElementById('errorBanner');
  banner.style.display = 'none';
  banner.innerHTML = '';
}

function validate() {
  clearValidation();
  const errors = [];
  const flagField = (el) => el.classList.add('input-error');

  // Player count
  const numPlayersEl = document.getElementById('numPlayers');
  const numPlayers = parseInt(numPlayersEl.value);
  if (!numPlayersEl.value.trim() || isNaN(numPlayers) || numPlayers < 4 || numPlayers > 40) {
    flagField(numPlayersEl);
    errors.push('Players must be a number between 4 and 40');
  }

  // Court count
  const numCourtsEl = document.getElementById('numCourts');
  const numCourts = parseInt(numCourtsEl.value);
  if (!numCourtsEl.value.trim() || isNaN(numCourts) || numCourts < 1 || numCourts > 10) {
    flagField(numCourtsEl);
    errors.push('Courts must be a number between 1 and 10');
  }

  // Players vs courts: need at least courts * 4 players
  if (!isNaN(numPlayers) && !isNaN(numCourts) && numPlayers < numCourts * 4) {
    flagField(numPlayersEl);
    flagField(numCourtsEl);
    errors.push(`Need at least ${numCourts * 4} players for ${numCourts} court${numCourts > 1 ? 's' : ''} (4 per court)`);
  }

  // Player names: all must be non-empty
  const names = [];
  let emptyCount = 0;
  for (let i = 0; i < currentPlayerCount; i++) {
    const el = document.getElementById(`p${i}`);
    const v = el.value.trim();
    if (!v) { emptyCount++; flagField(el); }
    names.push(v);
  }
  if (emptyCount > 0) {
    errors.push(`${emptyCount} player name${emptyCount > 1 ? 's are' : ' is'} empty`);
  }

  // Player names: duplicates need a last initial to distinguish
  const seen = {};
  for (let i = 0; i < currentPlayerCount; i++) {
    const lower = names[i].toLowerCase();
    if (!lower) continue;
    if (seen[lower] !== undefined) {
      flagField(document.getElementById(`p${i}`));
      flagField(document.getElementById(`p${seen[lower]}`));
      errors.push(`"${names[i]}" appears more than once \u2014 add a last name initial (e.g. "${names[i]} A.")`);
    } else {
      seen[lower] = i;
    }
  }

  // Court numbers: must be valid positive integers
  for (let i = 0; i < currentCourtCount; i++) {
    const el = document.getElementById(`court${i}`);
    const v = parseInt(el.value);
    if (!el.value.trim() || isNaN(v) || v < 1 || v > 99) {
      flagField(el);
      errors.push(`Court ${i + 1} must be a number between 1 and 99`);
    }
  }

  // Court numbers: check for duplicates
  const courtVals = [];
  for (let i = 0; i < currentCourtCount; i++) courtVals.push(document.getElementById(`court${i}`).value.trim());
  for (let i = 0; i < currentCourtCount; i++) {
    for (let j = i + 1; j < currentCourtCount; j++) {
      if (courtVals[i] && courtVals[j] && courtVals[i] === courtVals[j]) {
        flagField(document.getElementById(`court${i}`));
        flagField(document.getElementById(`court${j}`));
        errors.push(`Duplicate court number: ${courtVals[i]}`);
      }
    }
  }

  // Rounds: must be 1-30
  const roundsEl = document.getElementById('numRounds');
  const rounds = parseInt(roundsEl.value);
  if (!roundsEl.value.trim() || isNaN(rounds) || rounds < 1 || rounds > 30) {
    flagField(roundsEl);
    errors.push('Rounds must be a number between 1 and 30');
  }

  if (errors.length > 0) {
    const banner = document.getElementById('errorBanner');
    const unique = [...new Set(errors)];
    banner.innerHTML = unique.length === 1
      ? unique[0]
      : '<ul>' + unique.map(e => `<li>${e}</li>`).join('') + '</ul>';
    banner.style.display = 'block';
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return null;
  }

  return { names: names.map((n,i) => n || `Player ${i+1}`), rounds, numPlayers, numCourts };
}

function generate() {
  const result = validate();
  if (!result) return;

  const { names, rounds, numPlayers, numCourts } = result;
  const iterations = 8000;
  const genders = getGenders();
  const preferMixed = document.getElementById('preferMixed').checked;
  const courtNames = [];
  for (let i = 0; i < numCourts; i++) {
    courtNames.push(`Court ${document.getElementById('court' + i).value || (i + 1)}`);
  }
  const scheduleResult = generateSchedule(numPlayers, numCourts, rounds, iterations, genders, preferMixed);
  lastFullResult = scheduleResult;
  scheduleCourtNames = courtNames;
  renderSchedule(scheduleResult, names, courtNames);
  renderStats(scheduleResult, names);
  document.getElementById('output').style.display = 'block';
  document.getElementById('scheduleSection').scrollIntoView({ behavior: 'smooth' });
  saveState();
}

function pickWinner(roundNum, courtIdx, team) {
  if (!roundWinners[roundNum]) roundWinners[roundNum] = {};
  // Toggle: click same team again to deselect
  if (roundWinners[roundNum][courtIdx] === team) {
    roundWinners[roundNum][courtIdx] = null;
  } else {
    roundWinners[roundNum][courtIdx] = team;
  }
  updateRoundStates();
  saveState();
}

function isRoundComplete(roundNum) {
  if (!roundWinners[roundNum]) return false;
  for (let c = 0; c < numCourtsInSchedule; c++) {
    if (!roundWinners[roundNum][c]) return false;
  }
  return true;
}

function updateRoundStates() {
  // Find current round (first non-completed)
  let currentRound = null;
  for (let i = 1; i <= totalRounds; i++) {
    if (!isRoundComplete(i)) { currentRound = i; break; }
  }

  // Update banner
  const banner = document.getElementById('currentRoundBanner');
  if (currentRound) {
    banner.innerHTML = `<span class="current-round-dot"></span>
      <span class="current-round-text">Current Round: <span>${currentRound}</span> of ${totalRounds}</span>`;
  } else {
    banner.innerHTML = `<span class="all-done-text">All ${totalRounds} rounds complete</span>`;
  }

  // Update round cards and team states
  for (let i = 1; i <= totalRounds; i++) {
    const el = document.getElementById(`round-${i}`);
    if (!el) continue;
    const done = isRoundComplete(i);
    el.classList.toggle('round-completed', done);
    el.classList.toggle('current-round', i === currentRound);
    el.classList.toggle('round-future', currentRound !== null && i > currentRound);

    for (let c = 0; c < numCourtsInSchedule; c++) {
      const teamAEl = document.getElementById(`r${i}c${c}a`);
      const teamBEl = document.getElementById(`r${i}c${c}b`);
      if (!teamAEl || !teamBEl) continue;
      const winner = roundWinners[i] && roundWinners[i][c];
      teamAEl.classList.toggle('winner', winner === 'A');
      teamAEl.classList.toggle('loser', winner === 'B');
      teamBEl.classList.toggle('winner', winner === 'B');
      teamBEl.classList.toggle('loser', winner === 'A');
    }
  }

  renderLeaderboard();
}

function renderLeaderboard() {
  const section = document.getElementById('leaderboardSection');
  if (!scheduleData || !scheduleNames) { section.innerHTML = ''; return; }

  // Compute wins/losses per player index
  const n = scheduleNames.length;
  const wins = new Array(n).fill(0);
  const losses = new Array(n).fill(0);

  for (const round of scheduleData) {
    const rw = roundWinners[round.round];
    if (!rw) continue;
    round.courts.forEach((court, ci) => {
      const w = rw[ci];
      if (!w) return;
      const winTeam = w === 'A' ? court.teamA : court.teamB;
      const loseTeam = w === 'A' ? court.teamB : court.teamA;
      winTeam.forEach(p => wins[p]++);
      loseTeam.forEach(p => losses[p]++);
    });
  }

  // Check if any results exist
  const totalGames = wins.reduce((a, b) => a + b, 0);
  if (totalGames === 0) {
    section.innerHTML = `<div class="leaderboard"><h2>Leaderboard</h2>
      <div class="card" style="text-align:center;padding:2rem;">
        <span style="color:#4b5c72;font-size:0.85rem;">Select game winners to populate the leaderboard</span>
      </div></div>`;
    return;
  }

  // Build player rows sorted by win%, then wins, then fewer losses
  const players = scheduleNames.map((name, i) => ({
    name, wins: wins[i], losses: losses[i],
    total: wins[i] + losses[i],
    pct: (wins[i] + losses[i]) > 0 ? wins[i] / (wins[i] + losses[i]) : 0
  }));
  players.sort((a, b) => b.pct - a.pct || b.wins - a.wins || a.losses - b.losses);

  const medals = ['\u{1F947}', '\u{1F948}', '\u{1F949}'];

  let html = '<div class="leaderboard"><h2>Leaderboard</h2>';
  html += '<table class="leaderboard-table"><thead><tr>';
  html += '<th>Player</th><th>W</th><th>L</th><th>Win %</th><th class="lb-bar-cell"></th>';
  html += '</tr></thead><tbody>';

  players.forEach((p, idx) => {
    const pct = p.total > 0 ? (p.pct * 100).toFixed(0) : '\u2014';
    const wPct = p.total > 0 ? (p.wins / p.total * 100).toFixed(1) : 0;
    const lPct = p.total > 0 ? (p.losses / p.total * 100).toFixed(1) : 0;
    const medal = idx < 3 && p.total > 0 ? `<span class="lb-medal">${medals[idx]}</span>` : '';
    const rank = idx + 1;

    html += `<tr>
      <td>${medal}<span class="lb-rank">${rank}.</span><span class="lb-name">${p.name}</span></td>
      <td class="lb-wins">${p.wins}</td>
      <td class="lb-losses">${p.losses}</td>
      <td class="lb-pct">${p.total > 0 ? pct + '%' : '<span class="lb-empty">\u2014</span>'}</td>
      <td class="lb-bar-cell"><div class="lb-bar">
        <div class="lb-bar-w" style="width:${wPct}%"></div>
        <div class="lb-bar-l" style="width:${lPct}%"></div>
      </div></td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  section.innerHTML = html;
}

function renderSchedule(result, names, courtNames) {
  const section = document.getElementById('scheduleSection');
  totalRounds = result.schedule.length;
  numCourtsInSchedule = courtNames.length;
  roundWinners = {};
  scheduleData = result.schedule;
  scheduleNames = names;

  let html = `<div class="schedule-header"><h2>Schedule</h2>
    <button class="btn-export" onclick="exportPDF()">Export PDF</button></div>`;
  html += '<div id="currentRoundBanner" class="current-round-banner"></div>';

  for (const round of result.schedule) {
    const sitOutNames = round.sitOuts.map(i => names[i]).join(', ');
    html += `<div class="round" id="round-${round.round}">
      <div class="round-header">
        <span class="round-title">Round ${round.round}</span>
        <div class="round-header-right">
          ${round.sitOuts.length > 0 ? `<span class="sit-out">On bye: ${sitOutNames}</span>` : ''}
        </div>
      </div>
      <div class="courts">`;

    round.courts.forEach((court, ci) => {
      html += `<div class="court">
        <div class="court-label">${courtNames[ci]}</div>
        <div class="matchup">
          <span class="team team-a" id="r${round.round}c${ci}a" onclick="pickWinner(${round.round},${ci},'A')"><span class="serve-badge">SERVE</span>${names[court.teamA[0]]} &amp; ${names[court.teamA[1]]}</span>
          <span class="vs">vs</span>
          <span class="team team-b" id="r${round.round}c${ci}b" onclick="pickWinner(${round.round},${ci},'B')">${names[court.teamB[0]]} &amp; ${names[court.teamB[1]]}</span>
        </div>
      </div>`;
    });

    html += '</div></div>';
  }

  section.innerHTML = html;
  updateRoundStates();
}

function exportPDF() {
  const d = new Date();
  const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('printDate').textContent = d.toLocaleDateString('en-US', opts);
  window.print();
}

function renderStats(result, names) {
  const section = document.getElementById('statsSection');
  const { partnerCount, opponentCount, sitOutCount, playCount } = result;
  const n = names.length;

  // Compute diversity metrics
  let totalPartnerPairs = 0, uniquePartnerPairs = 0;
  let totalOpponentPairs = 0, uniqueOpponentPairs = 0;
  let maxPartner = 0, maxOpponent = 0;

  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      if (partnerCount[i][j] > 0) { uniquePartnerPairs++; totalPartnerPairs += partnerCount[i][j]; }
      if (partnerCount[i][j] > maxPartner) maxPartner = partnerCount[i][j];
      if (opponentCount[i][j] > 0) { uniqueOpponentPairs++; totalOpponentPairs += opponentCount[i][j]; }
      if (opponentCount[i][j] > maxOpponent) maxOpponent = opponentCount[i][j];
    }
  }

  const possiblePairs = n * (n - 1) / 2; // 105
  const partnerDiversity = (uniquePartnerPairs / possiblePairs * 100).toFixed(1);
  const opponentDiversity = (uniqueOpponentPairs / possiblePairs * 100).toFixed(1);

  let html = `<div class="stats-toggle collapsed" onclick="this.classList.toggle('collapsed');this.nextElementSibling.classList.toggle('collapsed')">
    <h2>Statistics</h2><span class="stats-chevron">&#9660;</span>
  </div><div class="stats-body collapsed"><div class="stats-grid">`;

  // Summary card
  html += `<div class="stat-card">
    <h3>Diversity Scores</h3>
    <div class="stat-row"><span class="stat-name">Unique partner pairs</span>
      <span class="stat-value">${uniquePartnerPairs} / ${possiblePairs} (${partnerDiversity}%)</span></div>
    <div class="diversity-bar"><div class="diversity-fill" style="width:${partnerDiversity}%;background:linear-gradient(90deg,#3b82f6,#60a5fa)"></div></div>
    <div class="stat-row" style="margin-top:0.5rem"><span class="stat-name">Unique opponent pairs</span>
      <span class="stat-value">${uniqueOpponentPairs} / ${possiblePairs} (${opponentDiversity}%)</span></div>
    <div class="diversity-bar"><div class="diversity-fill" style="width:${opponentDiversity}%;background:linear-gradient(90deg,#8b5cf6,#a78bfa)"></div></div>
    <div class="stat-row" style="margin-top:0.5rem"><span class="stat-name">Max times as partners</span>
      <span class="stat-value">${maxPartner}</span></div>
    <div class="stat-row"><span class="stat-name">Max times as opponents</span>
      <span class="stat-value">${maxOpponent}</span></div>
  </div>`;

  // Per-player card
  html += `<div class="stat-card"><h3>Player Summary</h3>`;
  for (let i = 0; i < n; i++) {
    const partners = new Set(), opponents = new Set();
    for (let j = 0; j < n; j++) {
      if (j !== i && partnerCount[i][j] > 0) partners.add(j);
      if (j !== i && opponentCount[i][j] > 0) opponents.add(j);
    }
    html += `<div class="stat-row">
      <span class="stat-name">${names[i]}</span>
      <span class="stat-value">${playCount[i]} games, ${partners.size} partners, ${opponents.size} opp${sitOutCount[i] > 0 ? `, ${sitOutCount[i]} byes` : ''}</span>
    </div>`;
  }
  html += '</div></div>';

  // Partner matrix
  html += renderMatrix('Partner Count Matrix', partnerCount, names, n, maxPartner);
  // Opponent matrix
  html += renderMatrix('Opponent Count Matrix', opponentCount, names, n, maxOpponent);

  html += '</div>'; // close stats-body
  section.innerHTML = html;
}

function renderMatrix(title, matrix, names, n, maxVal) {
  // Short names for headers
  const short = names.map(nm => nm.length > 6 ? nm.slice(0, 5) + '.' : nm);
  let html = `<div class="matrix-container"><h3>${title}</h3><table class="matrix"><thead><tr><th></th>`;
  for (let j = 0; j < n; j++) html += `<th>${short[j]}</th>`;
  html += '</tr></thead><tbody>';

  for (let i = 0; i < n; i++) {
    html += `<tr><th>${short[i]}</th>`;
    for (let j = 0; j < n; j++) {
      if (i === j) {
        html += '<td class="diag">-</td>';
      } else {
        const v = matrix[i][j];
        const heat = maxVal > 0 ? Math.min(5, Math.round(v / maxVal * 5)) : 0;
        html += `<td class="heat-${heat}">${v}</td>`;
      }
    }
    html += '</tr>';
  }
  html += '</tbody></table></div>';
  return html;
}

// --- Restore saved state on load ---
restoreState();
</script>
